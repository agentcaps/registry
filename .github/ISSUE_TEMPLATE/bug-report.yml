name: Bug report
description: Report a reproducible problem in AgentCaps Registry.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include commands, input files, and the smallest source example possible.
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error output or generated files if relevant.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: npx -y @agentcaps/registry@latest --version, package version, or commit SHA
    validations:
      required: false
